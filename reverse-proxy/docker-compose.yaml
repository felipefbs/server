services:
  nginx:
    image: nginx:${NGINX_VER}
    container_name: nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    ports:
      - "80:80"
    volumes:
      - ${BASE_CONFIG_DIR}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-net
      - services-net
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

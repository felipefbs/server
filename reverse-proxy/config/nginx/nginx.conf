# OctoPrint - Configuração Otimizada
server {
    listen 80;
    server_name octoprint.home;

    # 3. Permite uploads de arquivos GCODE pesados sem erro 413 (Payload Too Large)
    client_max_body_size 0;

    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }

    location / {
        set $upstream_octoprint http://octoprint;
        proxy_pass $upstream_octoprint;

        # 1 & 2. Suporte obrigatório a WebSockets para comunicação em tempo real da interface
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 4. Header necessário para o OctoPrint validar CSRF e resolver rotas internas
        proxy_set_header X-Scheme $scheme;

        # Garante que o host original seja passado para o backend
        proxy_set_header Host $host;

        # Opcional: Aumenta o timeout para evitar desconexões em operações longas
        proxy_read_timeout 120s;
    }

    # 5. Bloco dedicado para o stream da webcam
    location /webcam/ {
        set $upstream_octoprint_webcam http://octoprint/webcam/;
        proxy_pass $upstream_octoprint_webcam;

        # Desabilita o buffering para garantir que o vídeo seja transmitido sem latência
        proxy_buffering off;
    }
}

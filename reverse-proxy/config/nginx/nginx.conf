server {
    listen 80;
    server_name esphome.home;

    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }

    location / {
        set $upstream_esphome http://esphome:6052;
        proxy_pass $upstream_esphome;
        proxy_http_version 1.1;

        # 1. Cabeçalhos movidos para DENTRO do location para não serem sobrescritos
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 2. Configurações essenciais de WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 3. Desativação do Buffer (Crucial para o carregamento da tela do ESPHome)
        proxy_buffering off;
    }
}



services:
  nginx:
    image: nginx:1.31.2
    container_name: nginx
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    depends_on:
      pihole:
        condition: service_healthy
      cloudflared:
        condition: service_healthy
      librespeed:
        condition: service_healthy
      homarr:
        condition: service_healthy
      octoprint:
        condition: service_healthy
      speedtest-tracker:
        condition: service_healthy
      homeassistant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-net
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    container_name: cloudflared
    image: visibilityspots/cloudflared:latest
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    depends_on:
      pihole:
        condition: service_healthy
    environment:
      - UPSTREAM1=https://1.1.1.1/dns-query
      - UPSTREAM2=https://1.0.0.1/dns-query
      - PORT=5054
      - ADDRESS=0.0.0.0
    networks:
      - services-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5054 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  pihole:
    container_name: pihole
    image: pihole/pihole:2026.07.2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      TZ: '${TIMEZONE}'
      FTLCONF_webserver_api_password: ${PIHOLE_PWD}
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - '${PIHOLE_CONFIG}:/etc/pihole'
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "pihole", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

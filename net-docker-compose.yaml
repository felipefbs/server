services:
  dnscrypt-proxy:
    container_name: dnscrypt-proxy
    image: klutchell/dnscrypt-proxy:latest
    restart: unless-stopped
    hostname: encrypted-dns
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    volumes:
      - ${CONFIG_PATH}/dnscrypt-proxy:/config
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "dnscrypt-proxy", "-config", "/config/dnscrypt-proxy.toml", "-check"]
      interval: 30s
      timeout: 5s
      retries: 3

  pihole:
    container_name: pihole
    image: pihole/pihole:2026.07.2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      TZ: '${TIMEZONE}'
      FTLCONF_webserver_api_password: ${PIHOLE_PWD}
      FTLCONF_dns_listeningMode: 'ALL'
      FTLCONF_dns_upstreams: 'encrypted-dns#5054'
    volumes:
      - '${PIHOLE_CONFIG}:/etc/pihole'
      - './99-wildcard.conf:/etc/dnsmasq.d/99-wildcard.conf:ro'
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "pihole", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  librespeed:
    image: lscr.io/linuxserver/librespeed:6.1.0
    hostname: speedtest
    container_name: speedtest
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${LIBRESPEED_CONFIG}:/config
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - APP_KEY=${SPEEDTEST_TRACKER_APP_KEY}
      - APP_URL=http://speedtest-tracker.home
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=${SPEEDTEST_TRACKER_SCHEDULE}
      - APP_TIMEZONE=${TIMEZONE}
    volumes:
      - ${SPEEDTEST_TRACKER_CONFIG}:/config
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

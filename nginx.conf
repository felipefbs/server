# Global Proxy Settings
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# DNS Resolver for Docker and Error Page
resolver 127.0.0.11 valid=30s;
error_page 502 /502.html;

# Homarr Dashboard (Default)
server {
    listen 80;
    server_name dashboard.local "";

    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }

    location / {
        set $upstream_homarr http://homarr:7575;
        proxy_pass $upstream_homarr;
    }
}

# Network Services
server {
    listen 80;
    server_name pihole.local;

    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }

    location / {
        set $upstream_pihole http://pihole;
        proxy_pass $upstream_pihole;
    }
}


services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    restart: unless-stopped
    hostname: torrent
    container_name: torrent
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:

      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${QBITTORRENT_CONFIG}:/config
      - ${MEDIA_PATH}:/downloads
    ports:
      - '${TORRENT_PORT}:${TORRENT_PORT}'
      - '${TORRENT_PORT}:${TORRENT_PORT}/udp'
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  jackett:
    image: ghcr.io/linuxserver/jackett:latest
    hostname: jackett
    container_name: jackett
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${JACKETT_CONFIG}:/config
      - ${MEDIA_PATH}:/downloads
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117"]
      interval: 30s
      timeout: 10s
      retries: 3

  bazarr:
    image: ghcr.io/linuxserver/bazarr:latest
    hostname: bazarr
    container_name: bazarr
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${MEDIA_PATH}:/movies
      - ${BAZARR_CONFIG}:/config
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 30s
      timeout: 10s
      retries: 3

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    hostname: prowlarr
    container_name: prowlarr
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      flaresolverr:
        condition: service_healthy
    environment:
      - ./torrentio.yml:/var/lib/Definitions/Custom/torrentio.yml
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696"]
      interval: 30s
      timeout: 10s
      retries: 3

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    hostname: flaresolverr
    container_name: flaresolverr
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_HTML=${LOG_HTML}
      - CAPTCHA_SOLVER=none
      - TZ=${TIMEZONE}
    volumes:
      - ${FLARESOLVERR_CONFIG}:/config
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 30s
      timeout: 10s
      retries: 3

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    hostname: radarr
    container_name: radarr
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1G
    depends_on:
      qbittorrent:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${RADARR_CONFIG}:/config
      - ${MEDIA_PATH}:/media
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 30s
      timeout: 10s
      retries: 3

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    hostname: sonarr
    container_name: sonarr
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1G
    depends_on:
      qbittorrent:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${SONARR_CONFIG}:/config
      - ${MEDIA_PATH}:/media
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3

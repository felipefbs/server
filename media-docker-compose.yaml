name: 'media'

networks:
  proxy-net:
    name: proxy-net
    driver: bridge
    external: true

services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    restart: unless-stopped
    hostname: torrent
    container_name: torrent
    environment:
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/qbittorrent/config:/config
      - /mnt/dados/media:/downloads
    ports:
      - '8080:8080'
      - '62609:62609'
    networks:
      - proxy-net


  jackett:
    image: ghcr.io/linuxserver/jackett:latest
    hostname: jackett
    container_name: jackett
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/jackett/downloads:/downloads
      - ~/jackett/config:/config
    ports:
      - '9117:9117'
    dns:
      - 1.1.1.1
      - 1.0.0.1
    networks:
      - proxy-net

  bazarr:
    image: ghcr.io/linuxserver/bazarr:latest
    hostname: bazarr
    container_name: bazarr
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=1000
      - PGID=1000
    volumes:
      - /mnt/dados/media:/movies
      - ~/bazarr/appdata/config:/config
    ports:
      - '6767:6767'
    networks:
      - proxy-net

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    hostname: prowlarr
    container_name: prowlarr
    restart: unless-stopped
    depends_on:
      - flaresolverr
    environment:
      - TZ=${TIMEZONE}
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/prowlarr/config:/config
      - ./torrentio.yml:/var/lib/Definitions/Custom/torrentio.yml
    ports:
      - '9696:9696'
    dns:
      - 1.1.1.1
      - 1.0.0.1
    networks:
      - proxy-net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    hostname: flaresolverr
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TIMEZONE}
    volumes:
      - ~/flaresolverr/config:/config
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1 # Disable ipv6 to prevent some problems
    ports:
      - '8191:8191'
    networks:
      - proxy-net

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    hostname: radarr
    container_name: radarr
    restart: unless-stopped
    depends_on:
      - qbittorrent
    environment:
      - TZ=${TIMEZONE}
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/radarr/appdata/config:/config
      - /mnt/dados/media:/media
    ports:
      - '7878:7878'
    networks:
      - proxy-net

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    hostname: sonarr
    container_name: sonarr
    restart: unless-stopped
    depends_on:
      - qbittorrent
    environment:
      - TZ=${TIMEZONE}
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/sonarr/appdata/config:/config
      - /mnt/dados/media:/media
    ports:
      - '8989:8989'
    networks:
      - proxy-net


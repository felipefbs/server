services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:${QBIT_VER}
    restart: unless-stopped
    hostname: torrent
    container_name: torrent
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    environment:
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${BASE_DATA_DIR}/qbittorrent:/config
      - ${BASE_MEDIA_DIR}:/downloads
    ports:
      - '${TORRENT_PORT}:${TORRENT_PORT}'
      - '${TORRENT_PORT}:${TORRENT_PORT}/udp'
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  jackett:
    image: lscr.io/linuxserver/jackett:${JACKETT_VER}
    hostname: jackett
    container_name: jackett
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${BASE_DATA_DIR}/jackett:/config
      - ${BASE_MEDIA_DIR}:/downloads
    ports:
      - '9117:9117'
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117"]
      interval: 30s
      timeout: 10s
      retries: 3

  bazarr:
    image: lscr.io/linuxserver/bazarr:${BAZARR_VER}
    hostname: bazarr
    container_name: bazarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${BASE_DATA_DIR}/bazarr:/config
      - ${BASE_MEDIA_DIR}:/movies
    ports:
      - '6767:6767'
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 30s
      timeout: 10s
      retries: 3

  prowlarr:
    image: ghcr.io/hotio/prowlarr:${PROWLARR_VER}
    hostname: prowlarr
    container_name: prowlarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      flaresolverr:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${BASE_DATA_DIR}/prowlarr:/config
      - ${BASE_CONFIG_DIR}/prowlarr/torrentio.yml:/var/lib/Definitions/Custom/torrentio.yml:ro
    ports:
      - '9696:9696'
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696"]
      interval: 30s
      timeout: 10s
      retries: 3

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:${FLARESOLVERR_VER}
    hostname: flaresolverr
    container_name: flaresolverr
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_HTML=${LOG_HTML}
      - CAPTCHA_SOLVER=none
      - TZ=${TIMEZONE}
    volumes:
      - ${BASE_DATA_DIR}/flaresolverr:/config
    ports:
      - '8191:8191'
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 30s
      timeout: 10s
      retries: 3

  radarr:
    image: lscr.io/linuxserver/radarr:${RADARR_VER}
    hostname: radarr
    container_name: radarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    depends_on:
      qbittorrent:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${BASE_DATA_DIR}/radarr:/config
      - ${BASE_MEDIA_DIR}:/media
    ports:
      - '7878:7878'
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 30s
      timeout: 10s
      retries: 3

  sonarr:
    image: lscr.io/linuxserver/sonarr:${SONARR_VER}
    hostname: sonarr
    container_name: sonarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    depends_on:
      qbittorrent:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${BASE_DATA_DIR}/sonarr:/config
      - ${BASE_MEDIA_DIR}:/media
    ports:
      - '8989:8989'
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3

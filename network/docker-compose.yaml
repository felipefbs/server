services:
  dnscrypt-proxy:
    container_name: dnscrypt-proxy
    image: klutchell/dnscrypt-proxy:${DNSCRYPT_VER}
    restart: unless-stopped
    hostname: encrypted-dns
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    volumes:
      - ${BASE_CONFIG_DIR}/dnscrypt-proxy:/config
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "dnscrypt-proxy", "-config", "/config/dnscrypt-proxy.toml", "-check"]
      interval: 30s
      timeout: 5s
      retries: 3

  pihole:
    container_name: pihole
    image: pihole/pihole:${PIHOLE_VER}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      TZ: '${TIMEZONE}'
      WEBPASSWORD: ${PIHOLE_PWD}
      FTLCONF_dns_listeningMode: 'ALL'
      FTLCONF_dns_upstreams: 'dnscrypt-proxy#5054'
    volumes:
      - '${BASE_DATA_DIR}/pihole:/etc/pihole'
      - '${BASE_CONFIG_DIR}/pihole/99-wildcard.conf:/etc/dnsmasq.d/99-wildcard.conf:ro'
    cap_add:
      - NET_ADMIN
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "pihole", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  librespeed:
    image: lscr.io/linuxserver/librespeed:6.1.0
    hostname: speedtest
    container_name: speedtest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:${SPEEDTEST_TRACKER_VER}
    container_name: speedtest-tracker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - APP_KEY=${SPEEDTEST_TRACKER_APP_KEY}
      - APP_URL=http://speedtest-tracker.home
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=${SPEEDTEST_TRACKER_SCHEDULE}
      - APP_TIMEZONE=${TIMEZONE}
    volumes:
      - ${BASE_DATA_DIR}/speedtest-tracker:/config
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

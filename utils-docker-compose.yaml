name: 'utils'

volumes:
  portainer_data:

networks:
  proxy-net:
    name: proxy-net
    driver: bridge
    external: true

services:
  portainer:
    image: portainer/portainer-ce:latest
    hostname: portainer
    restart: unless-stopped
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - '9000:9000'
    networks:
      - proxy-net
  librespeed:
    image: lscr.io/linuxserver/librespeed:latest
    hostname: speedtest
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - PUID=1000
      - PGID=1000
    volumes:
      - /mnt/dados/librespeed:/config
    ports:
      - '9091:80'
    networks:
      - proxy-net

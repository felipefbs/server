name: 'utils'

volumes:
  portainer_data:

networks:
  proxy-net:
    name: proxy-net
    driver: bridge
    external: true

services:
  portainer:
    image: portainer/portainer-ce:latest
    hostname: portainer
    restart: unless-stopped
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    # ports:
    #   - '9000:9000'
    networks:
      - proxy-net

  librespeed:
    image: lscr.io/linuxserver/librespeed:latest
    hostname: speedtest
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - PUID=1000
      - PGID=1000
    volumes:
      - /mnt/dados/librespeed:/config
    # ports:
    #   - '9091:80'
    networks:
      - proxy-net

  organizr:
    image: organizrtools/organizr-v2:armhf
    hostname: organizr
    networks:
      - proxy-net
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /mnt/dados/organizr:/config
    # ports:
    #   - '80:80'
    cap_add:
      - NET_BIND_SERVICE


services:
  portainer:
    image: portainer/portainer-ce:latest
    hostname: portainer
    container_name: portainer
    restart: unless-stopped
    volumes:
      - ${PORTAINER_DATA}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3

  librespeed:
    image: lscr.io/linuxserver/librespeed:latest
    hostname: speedtest
    container_name: speedtest
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${LIBRESPEED_CONFIG}:/config
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  organizr:
    image: organizrtools/organizr-v2:latest
    hostname: organizr
    container_name: organizr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE}
    volumes:
      - ${ORGANIZR_CONFIG}:/config
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  homarr:
    container_name: homarr
    image: ghcr.io/ajnart/homarr:latest
    restart: unless-stopped
    volumes:
      - ${HOMARR_CONFIG}/configs:/app/data/configs
      - ${HOMARR_CONFIG}/icons:/app/public/icons
      - /var/run/docker.sock:/var/run/docker.sock # Optional: for docker integration
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7575"]
      interval: 30s
      timeout: 10s
      retries: 3

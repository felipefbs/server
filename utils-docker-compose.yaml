services:
  librespeed:
    image: lscr.io/linuxserver/librespeed:latest
    hostname: speedtest
    container_name: speedtest
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    depends_on:
      pihole:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${LIBRESPEED_CONFIG}:/config
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  homarr:
    container_name: homarr
    image: ghcr.io/ajnart/homarr:0.15.4
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      pihole:
        condition: service_healthy
    environment:
      - SECRET_ENCRYPTION_KEY=${AUTH_SECRET}
    volumes:
      - ${HOMARR_CONFIG}/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7575"]
      interval: 30s
      timeout: 10s
      retries: 3

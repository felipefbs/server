services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:${HOMARR_VER}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - SECRET_ENCRYPTION_KEY=${AUTH_SECRET}
    volumes:
      - ${BASE_DATA_DIR}/homarr/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7575"]
      interval: 30s
      timeout: 10s
      retries: 3
